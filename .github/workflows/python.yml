# Python gates: backend (FastAPI manager + workers).
#
# Lints with ruff, types with pyright, vulnerabilities with pip-audit.
# Tests run via pytest with testcontainers for Postgres + Kafka + OpenSearch
# in `backend.yml` (separated because the test job needs Docker).

name: python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: ruff + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app
      - run: ruff format --check app

  typecheck:
    name: pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: pip install pyright
      # backend/app/proto_gen/ is not checked in; generate it from
      # the .proto sources in /proto so pyright's import resolution
      # succeeds for `from app.proto_gen.edr.v1 import ...`.
      - name: generate proto bindings
        working-directory: ${{ github.workspace }}
        run: make proto-python
      - run: pyright app

  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      # Install our project so pip-audit sees our deps via the resolved env;
      # `--strict` would fail on any vuln; for now we report.
      - run: pip install -e '.[dev]'
      # CVE-2025-69872 / GHSA-w8v5-vhqr-4h9v is in `diskcache` 5.6.3,
      # pulled transitively by pySigma (manager-side Sigma rule store).
      # No fix released upstream as of 2026-05; re-evaluate when
      # pySigma releases against a fixed diskcache. Listing both the
      # CVE and GHSA forms because pip-audit's ID format depends on
      # the vulnerability service it queries.
      - run: pip-audit --skip-editable --ignore-vuln CVE-2025-69872 --ignore-vuln GHSA-w8v5-vhqr-4h9v
