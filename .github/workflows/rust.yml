# Rust gates: agent-core, agent-linux, agent-windows.
#
# Linux jobs build and test on ubuntu-latest. The Windows agent is checked
# only via `cargo check --target x86_64-pc-windows-msvc` on Linux (build
# requires the MSVC toolchain on a Windows runner; gating that is M9
# follow-up once we have a self-hosted lab-windows runner).
#
# Caching: keys hash Cargo.lock so cache invalidates on dep updates.

name: rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: install eBPF prerequisites
        run: |
          sudo apt-get update -q
          # `bpftool` standalone package isn't on Ubuntu 24.04 runners;
          # ships under linux-tools-common + linux-tools-generic. We
          # don't actually invoke bpftool from CI (the build embeds a
          # pre-compiled .o), but clang/llvm are needed to rebuild it
          # if ebpf/build.rs decides to.
          sudo apt-get install -qy clang llvm linux-tools-common linux-tools-generic
      - run: cargo clippy --workspace --all-targets --all-features --no-deps -- -D warnings

  test:
    name: test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install eBPF prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -qy clang llvm linux-tools-common linux-tools-generic
      - run: cargo test --workspace --all-features --no-fail-fast

  windows-check:
    name: cargo check (windows target)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      # aws-lc-sys (transitive via reqwest/hyper-rustls) needs NASM to
      # build its assembly fast paths on Windows. Without it, the
      # check job fails with `nasm not found in PATH`.
      - uses: ilammy/setup-nasm@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p agent-windows -p agent-core --target x86_64-pc-windows-msvc

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install --locked cargo-audit
      - run: cargo audit --deny warnings

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install --locked cargo-deny
      - run: cargo deny check
