# Frontend gates: tsc + eslint + prettier + npm audit.

name: frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    name: tsc + eslint + prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint --max-warnings=0 src
      - run: npx prettier --check src

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Production-only audit: dev tooling vulns aren't deploy-blocking.
      - run: npm audit --omit=dev --audit-level=high
